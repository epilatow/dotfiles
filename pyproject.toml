[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "dcc41da28d18f80551c687cf113df4525fb69556" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
