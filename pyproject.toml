[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "300b88f9738351f9402aaa819ddaaec9f4e294b6" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
