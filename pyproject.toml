[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "7750ad924e3e13f1673c41b4a7b4450ed2a55718" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
