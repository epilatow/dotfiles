[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "8c39fe73a76c7d2de0eda9df363a5459ceeff419" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
