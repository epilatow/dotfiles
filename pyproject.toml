[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "03325e1442ee17a5dc9b7fa11919c44010830e34" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
