[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "ec6807567f1dbe27ad5bca86d250616c3eb2ae61" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
