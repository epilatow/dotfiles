[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "ef6cbb229981b711f1b06735b19a8ddfc4d23f6d" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
