[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "4962eb55d4559084a9ac69f5e3a9c4c474913b3b" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
