[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "550109df6c6f552fcfc50e14211c1e0aea5e9344" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
