[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "3695dbd86f9a6fbaf2d616aabb0bfb0089cbdb02" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
