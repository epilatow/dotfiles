[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "8d69c72a2867449fec6e62a635d031a0e8dba1c4" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
