[project]
name = "dotfiles"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "epilatow-repo-shared",
    "pytest>=9.0.3",
]

[tool.uv.sources]
epilatow-repo-shared = { git = "https://github.com/epilatow/repo-shared", rev = "9fbb96a8e563cba46fc5e4e2324193543fc66d2f" }

[tool.pytest.ini_options]
testpaths = ["_repo_shared/tests"]
